# One-command local stack: web+gateway, AI service, MongoDB, Elasticsearch.
#   docker compose up --build   →   open http://localhost:4000
# The gateway serves the web console and connects to Mongo + ES; the webhook
# demo (see README) streams entities into the graph in real time.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=4000
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=caselens
      - ES_URL=http://elasticsearch:9200
      - AI_SERVICE_URL=http://ai:8000
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-caselens-demo-secret}
      - DEGRADE_GRACEFULLY=true
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      ai:
        condition: service_started

volumes:
  mongo-data:
